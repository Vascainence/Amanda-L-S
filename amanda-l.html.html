</html><!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para você ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Caveat', cursive;
            background: #1a1a1a;
            color: #fff;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            overflow-x: hidden;
        }

        .container {
            padding: 20px;
            animation: fadeIn 1.5s ease-in;
        }

        h1 {
            color: #ff0080;
            font-size: 8vw;
            margin-bottom: 20px;
        }

        /* Estilo do GIF (Segunda Imagem) */
        .gif-container img {
            width: 250px;
            max-width: 80%;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(255, 0, 128, 0.5);
            margin-bottom: 20px;
        }

        /* Estilo do Coração (Imagem que já existia antes) */
        .coracao-pulsante {
            font-size: 60px;
            color: #ff0080;
            animation: bater 0.8s infinite alternate;
            margin-top: 10px;
            opacity: 0; /* Começa invisível */
            animation: bater 0.8s infinite alternate, aparecer 2s forwards 1s; 
            /* 'aparecer' tem um atraso de 1s para vir depois do GIF */
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes aparecer {
            to { opacity: 1; }
        }

        @keyframes bater {
            from { transform: scale(1); }
            to { transform: scale(1.2); }
        }

        @media (min-width: 1200px) {
            h1 { font-size: 70px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Sabia que diria sim! ❤️</h1>
        
        <div class="gif-container">
            <img src="amor.gif" alt="GIF fofo">
        </div>

        <div class="coracao-pulsante">💖</div>
        
        <p style="font-size: 25px; margin-top: 20px;">Fico muito feliz por podermos conversar! 😊</p>
    </div>

</body>
</html>
