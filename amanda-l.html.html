<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para você ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Caveat', cursive;
            background: #1a1a1a;
            color: #fff;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            overflow: hidden;
        }

        .container {
            padding: 20px;
            animation: fadeIn 1.5s ease-in;
        }

        h1 {
            color: #ff0080;
            font-size: clamp(40px, 8vw, 75px);
            margin-bottom: 5px;
        }

        .coracao-grande {
            font-size: 90px;
            margin: 15px 0;
            animation: bater 0.8s infinite alternate;
            display: inline-block;
        }

        .frase-impacto {
            font-size: clamp(30px, 7vw, 55px);
            color: #ffcc00; /* Destaque em dourado */
            margin: 20px 0;
            line-height: 1.2;
            max-width: 90%;
            margin-left: auto;
            margin-right: auto;
        }

        p.final {
            font-size: 24px;
            opacity: 0.8;
            margin-top: 10px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes bater {
            from { transform: scale(1); }
            to { transform: scale(1.2); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Sabia que diria sim! ❤️</h1>
        
        <div class="coracao-grande">💖</div>
        
        <div class="frase-impacto">
            "Gosto tanto de você que posso enlouquecer."
        </div>
        
        <p class="final">Fico muito feliz por podermos conversar! 😊</p>
    </div>

</body>
</html>
