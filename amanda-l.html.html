<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Amanda ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@400;700&family=Caveat:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Caveat', cursive;
            background: #1a1a1a;
            color: #fff;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            overflow: hidden;
        }

        .container {
            padding: 20px;
            z-index: 2;
            animation: fadeIn 1.5s ease-in;
        }

        /* Estilo para o Título com o nome dela */
        h1 {
            font-family: 'Dancing Script', cursive;
            color: #ff0080;
            font-size: clamp(35px, 9vw, 80px);
            margin-bottom: 10px;
            text-shadow: 2px 2px 10px rgba(255, 0, 128, 0.3);
        }

        .coracao-grande {
            font-size: 85px;
            margin: 15px 0;
            animation: bater 0.8s infinite alternate;
            display: inline-block;
            filter: drop-shadow(0 0 10px #ff0080);
        }

        .frase-impacto {
            font-size: clamp(26px, 6vw, 42px);
            color: #ffcc00;
            margin: 20px 0;
            line-height: 1.3;
            max-width: 90%;
            margin-left: auto;
            margin-right: auto;
            font-style: italic;
        }

        /* Botão do WhatsApp com fonte limpa e moderna */
        .btn-whatsapp {
            display: inline-block;
            margin-top: 30px;
            padding: 16px 35px;
            background-color: #25d366;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-family: 'Montserrat', sans-serif;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 1px;
            box-shadow: 0 10px 20px rgba(37, 211, 102, 0.2);
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .btn-whatsapp:hover {
            transform: translateY(-3px) scale(1.05);
            background-color: #1ebe57;
            box-shadow: 0 15px 25px rgba(37, 211, 102, 0.4);
        }

        /* Estilo dos corações flutuantes */
        .heart {
            position: fixed;
            bottom: -20px;
            color: #ff0080;
            user-select: none;
            pointer-events: none;
            z-index: 1;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes bater { from { transform: scale(1); } to { transform: scale(1.15); } }
    </style>
</head>
<body>

    <div class="container">
        <h1>Sabia que você diria sim, Amanda! ❤️</h1>
        
        <div class="coracao-grande">💖</div>
        
        <div class="frase-impacto">
            "Gosto tanto de você que posso enlouquecer."
        </div>

        <a href="https://wa.me/5551993981826?text=Você%20é%20louco!%20Mas%20eu%20também%20gosto%20de%20você%20❤️" class="btn-whatsapp" target="_blank">
            ME CHAMA NO WHATSAPP 😊
        </a>
    </div>

    <script>
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.fontSize = Math.random() * 20 + 10 + 'px';
            heart.style.opacity = Math.random();
            
            document.body.appendChild(heart);

            const anim = heart.animate([
                { transform: 'translateY(0) rotate(0deg)', opacity: heart.style.opacity },
                { transform: `translateY(-110vh) rotate(${Math.random() * 360}deg)`, opacity: 0 }
            ], {
                duration: Math.random() * 3000 + 4000,
                easing: 'linear'
            });

            anim.onfinish = () => heart.remove();
        }
        setInterval(createHeart, 350);
    </script>

</body>
</html>
