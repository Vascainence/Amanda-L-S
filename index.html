<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Podemos conversar?</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Caveat', cursive;
      text-align: center;
      background: #1a1a1a;
      color: #fff;
      margin: 0;
      padding: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    h1 {
      color: #ff0080;
      font-size: 8vw;
      min-height: 1.2em;
      margin: 0;
    }

    .botoes {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-top: 30px;
      opacity: 0;
      transition: opacity 1s ease-in-out;
    }

    .botao {
      font-family: 'Caveat', cursive;
      padding: 10px 25px;
      font-size: 25px;
      background-color: #ff0080;
      color: #fff;
      border: none;
      cursor: pointer;
      margin: 0 15px;
      border-radius: 8px;
      transition: transform 0.3s;
    }

    #nao { position: relative; }

    .popping-heart {
      position: fixed;
      font-size: 30px;
      pointer-events: none;
      animation: pop-and-fade 0.7s ease-out forwards;
      z-index: 100;
    }

    @keyframes pop-and-fade {
      0% { transform: scale(0.5); opacity: 1; }
      100% { transform: scale(1.8); opacity: 0; }
    }
  </style>
</head>
<body>

  <h1></h1>

  <div class="botoes" id="container-botoes">
    <button id="sim" class="botao">Sim!</button>
    <button id="nao" class="botao">Não</button>
  </div>

  <script>
    const h1 = document.querySelector('h1');
    const botoesDiv = document.getElementById('container-botoes');
    const texto = "AINDA PODEMOS CONVERSAR?";
    let index = 0;

    function typeWriter() {
      if (index < texto.length) {
        h1.innerHTML += texto.charAt(index);
        index++;
        setTimeout(typeWriter, 120);
      } else {
        botoesDiv.style.opacity = '1';
      }
    }

    document.getElementById('nao').addEventListener('mouseover', function() {
      const maxX = window.innerWidth - this.offsetWidth;
      const maxY = window.innerHeight - this.offsetHeight;
      this.style.position = 'absolute';
      this.style.left = Math.random() * maxX + 'px';
      this.style.top = Math.random() * maxY + 'px';
    });

    document.getElementById('sim').addEventListener('click', () => {
      alert("Aguarde um momento..."); // Teste para ver se funciona
      window.location.href = 'amanda-l.html';
    });

    window.onload = typeWriter;
  </script><script>
    const h1 = document.querySelector('h1');
    const botoesDiv = document.getElementById('container-botoes');
    const simButton = document.getElementById('sim');
    const naoButton = document.getElementById('nao');
    const musica = document.getElementById('musica');

    const texto = "AINDA PODEMOS CONVERSAR?";
    let index = 0;

    // Efeito de digitação
    function typeWriter() {
      if (index < texto.length) {
        h1.innerHTML += texto.charAt(index);
        index++;
        setTimeout(typeWriter, 120);
      } else {
        botoesDiv.style.opacity = '1';
      }
    }

    // Botão "Não" foge
    naoButton.addEventListener('mouseover', function() {
      const maxX = window.innerWidth - this.offsetWidth;
      const maxY = window.innerHeight - this.offsetHeight;
      this.style.position = 'absolute';
      this.style.left = Math.random() * maxX + 'px';
      this.style.top = Math.random() * maxY + 'px';
    });

    // Botão "Sim" toca música e depois muda de página
    simButton.addEventListener('click', () => {
      // Inicia a música
      musica.play();

      // Deixa o botão rosa mais "aceso" para dar feedback
      simButton.style.background = "#ff66b3";
      simButton.innerText = "❤️";

      // Espera 2 segundos (2000ms) para a pessoa ouvir o início e então muda de página
      setTimeout(() => {
        window.location.href = 'amanda-l.html';
      }, 2000); 
    });

    window.onload = typeWriter;
</script>
</body><audio id="musica">
  <source src="musica.mp3" type="audio/mpeg">
</audio>
</html>
