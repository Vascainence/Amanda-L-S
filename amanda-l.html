<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para você ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Caveat', cursive;
            background: #1a1a1a;
            color: #fff;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }

        h1 {
            color: #ff0080;
            font-size: 45px;
            margin-bottom: 20px;
        }

        /* Estilo do GIF */
        .gif-img {
            width: 250px;
            max-width: 80%;
            border-radius: 15px;
            border: 3px solid #ff0080;
            margin-bottom: 20px;
            display: block; /* Garante que ele ocupe espaço */
        }

        /* Estilo do Coração de Emojis */
        .coracao-grande {
            font-size: 70px;
            margin-top: 10px;
            animation: bater 0.8s infinite alternate;
        }

        @keyframes bater {
            from { transform: scale(1); }
            to { transform: scale(1.2); }
        }
    </style>
</head>
<body>

    <h1>Sabia que diria sim! ❤️</h1>
    
    <img src="amor.gif" class="gif-img" alt="GIF fofo">

    <div class="coracao-grande">💖</div>
    
    <p style="font-size: 28px;">Fico muito feliz! 😊</p>

</body>
</html>
