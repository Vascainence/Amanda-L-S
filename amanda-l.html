<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Amanda ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Caveat:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Caveat', cursive;
            background-color: #1a1a1a;
            color: #fff;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            overflow: hidden;
        }

        .container {
            padding: 20px;
            position: relative;
            z-index: 10; /* Garante que o texto apareça sobre tudo */
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            color: #ff0080;
            font-size: clamp(35px, 9vw, 80px);
            margin: 0 0 10px 0;
        }

        .coracao-grande {
            font-size: 80px;
            margin: 15px 0;
            display: inline-block;
            animation: bater 0.8s infinite alternate;
        }

        .frase-impacto {
            font-size: clamp(26px, 6vw, 42px);
            color: #ffcc00;
            margin: 20px 0;
            font-style: italic;
            max-width: 90vw;
        }

        .btn-whatsapp {
            display: inline-block;
            margin-top: 25px;
            padding: 15px 35px;
            background-color: #25d366;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-family: sans-serif;
            font-size: 18px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.4);
        }

        @keyframes bater {
            from { transform: scale(1); }
            to { transform: scale(1.15); }
        }

        /* Corações flutuantes */
        .heart {
            position: absolute;
            color: #ff0080;
            top: 100vh;
            pointer-events: none;
            z-index: 1;
            animation: subir linear forwards;
        }

        @keyframes subir {
            to {
                transform: translateY(-110vh) rotate(360deg);
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Sabia que você diria sim, Amanda! ❤️</h1>
        
        <div class="coracao-grande">💖</div>
        
        <div class="frase-impacto">
            "Gosto tanto de você que posso enlouquecer."
        </div>

        <a <a href="https://wa.me/5551993981826?text=Sim!%20Sim!%20Sim!%20❤️✨" class="btn-whatsapp">
Sim! Sim! Sim! ❤️✨</a>
        
        </a>
    </div>

    <script>
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + "vw";
            heart.style.fontSize = Math.random() * 20 + 10 + "px";
            
            // Velocidade aleatória entre 3 e 6 segundos
            const duracao = Math.random() * 3 + 3;
            heart.style.animationDuration = duracao + "s";
            heart.style.opacity = Math.random();

            document.body.appendChild(heart);

            // Remove o coração depois que a animação acaba
            setTimeout(() => {
                heart.remove();
            }, duracao * 1000);
        }

        // Cria corações a cada 400 milissegundos
        setInterval(createHeart, 400);
    </script>

</body>
</html>
