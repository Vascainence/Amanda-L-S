<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para você ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Caveat', cursive;
            background: #1a1a1a;
            color: #fff;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            overflow: hidden;
        }

        .container {
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #ff0080;
            font-size: clamp(40px, 8vw, 80px);
            margin-bottom: 20px;
        }

        /* Estilo do GIF */
        .gif-container {
            width: 280px;
            max-width: 85%;
            margin-bottom: 20px;
        }

        .gif-container img {
            width: 100%;
            border-radius: 15px;
            border: 3px solid #ff0080;
            box-shadow: 0 0 15px rgba(255, 0, 128, 0.4);
        }

        /* Coração de Emojis que já existia */
        .coracao-pulsante {
            font-size: 60px;
            margin-top: 10px;
            animation: bater 0.8s infinite alternate;
        }

        @keyframes bater {
            from { transform: scale(1); }
            to { transform: scale(1.2); }
        }

        p {
            font-size: clamp(24px, 5vw, 35px);
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Sabia que diria sim! ❤️</h1>
        
        <div class="gif-container">
            <img src="img/amor.gif" alt="Nosso GIF">
        </div>

        <div class="coracao-pulsante">💖</div>
        
        <p>Fico muito feliz por podermos conversar! 😊</p>
    </div>

</body>
</html>
