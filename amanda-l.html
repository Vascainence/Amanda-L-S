<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Amanda ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Caveat:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Caveat', cursive;
            background-color: #1a1a1a;
            color: #fff;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            overflow: hidden;
        }

        .container {
            padding: 20px;
            z-index: 10;
            max-width: 90vw;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            color: #ff0080;
            font-size: clamp(35px, 8vw, 75px);
            margin: 0;
        }

        .coracao-grande {
            font-size: clamp(60px, 15vw, 85px);
            margin: 10px 0;
            display: inline-block;
            animation: bater 0.8s infinite alternate;
        }

        .frase-impacto {
            font-size: clamp(26px, 6vw, 42px);
            color: #ffcc00;
            margin: 15px 0;
            font-style: italic;
        }

        .btn-whatsapp {
            display: inline-block;
            margin-top: 20px;
            padding: 15px 30px;
            background-color: #25d366;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-family: sans-serif;
            font-size: clamp(16px, 4vw, 20px);
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.4);
            transition: transform 0.3s;
        }

        .btn-whatsapp:hover { transform: scale(1.05); }

        /* Estilo da nova frase final */
        .frase-reflexao {
            font-size: clamp(20px, 5vw, 28px);
            color: rgba(255, 255, 255, 0.7);
            margin-top: 25px;
            line-height: 1.2;
            font-style: italic;
        }

        @keyframes bater {
            from { transform: scale(1); }
            to { transform: scale(1.15); }
        }

        .heart {
            position: absolute;
            color: #ff0080;
            top: 100vh;
            pointer-events: none;
            z-index: 1;
            animation: subir linear forwards;
        }

        @keyframes subir {
            to { transform: translateY(-110vh) rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Sabia que você diria sim, Amanda! ❤️</h1>
        
        <div class="coracao-grande">💖</div>
        
        <div class="frase-impacto">
            "Gosto tanto de você que posso enlouquecer."
        </div>

        <a href="https://wa.me/5551993981826?text=Sim!%20Sim!%20Sim!%20❤️✨" class="btn-whatsapp">
            Diz que sim por aqui também! ✨
        </a>

        <div class="frase-reflexao">
            "Eu quero ser melhor que antes, deixe-me lidar com isso agora."
        </div>
    </div>

    <script>
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + "vw";
            heart.style.fontSize = Math.random() * 20 + 10 + "px";
            const duracao = Math.random() * 3 + 3;
            heart.style.animationDuration = duracao + "s";
            heart.style.opacity = Math.random();
            document.body.appendChild(heart);
            setTimeout(() => { heart.remove(); }, duracao * 1000);
        }
        setInterval(createHeart, 400);
    </script>

</body>
</html>
