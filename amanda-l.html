<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para você ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Caveat', cursive;
            background: #1a1a1a;
            color: #fff;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            padding: 20px;
            animation: fadeIn 2s ease-in;
        }

        h1 {
            color: #ff0080;
            font-size: 10vw;
            margin-bottom: 10px;
        }

        p {
            font-size: 5vw;
            max-width: 80%;
        }

        .coracao-grande {
            font-size: 80px;
            margin-top: 20px;
            animation: bater 0.8s infinite alternate;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes bater {
            from { transform: scale(1); }
            to { transform: scale(1.2); }
        }

        @media (min-width: 1200px) {
            h1 { font-size: 80px; }
            p { font-size: 35px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Sabia que diria sim! ❤️</h1>
        <p>Preparei isso só para te dizer o quanto nossa conversa é importante para mim.</p>
        <div class="coracao-grande">💖</div>
    </div>

    <audio id="musica-final" autoplay loop>
        <source src="musica.mp3" type="audio/mpeg">
    </audio>

    <script>
        // Tenta tocar o som automaticamente (o clique na página anterior ajuda a liberar aqui)
        window.onload = () => {
            const audio = document.getElementById('musica-final');
            audio.volume = 0.5; // Volume um pouco mais baixo se quiser
            audio.play().catch(e => console.log("Aguardando interação"));
        };
    </script>
</body>

        .gif-container img {
            width: 250px;
            max-width: 80%;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(255, 0, 128, 0.5);
            margin-bottom: 20px;
        }

        /* Estilo do Coração (Imagem que já existia antes) */
        .coracao-pulsante {
            font-size: 60px;
            color: #ff0080;
            animation: bater 0.8s infinite alternate;
            margin-top: 10px;
            opacity: 0; /* Começa invisível */
            animation: bater 0.8s infinite alternate, aparecer 2s forwards 1s; 
            /* 'aparecer' tem um atraso de 1s para vir depois do GIF */
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes aparecer {
            to { opacity: 1; }
        }

        @keyframes bater {
            from { transform: scale(1); }
            to { transform: scale(1.2); }
        }

            h1 { font-size: 70px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Sabia que diria sim! ❤️</h1>
        
        <div class="gif-container">
            <img src="amor.gif" alt="GIF fofo">
        </div>

        <div class="coracao-pulsante">💖</div>
        
        <p style="font-size: 25px; margin-top: 20px;">Fico muito feliz por podermos conversar! 😊</p>
    </div>

</body>
</html>
