<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para você ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Caveat', cursive;
            background: #1a1a1a;
            color: #fff;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            overflow: hidden;
        }

        .container {
            padding: 20px;
            animation: fadeIn 1.5s ease-in;
        }

        h1 {
            color: #ff0080;
            font-size: clamp(40px, 8vw, 75px);
            margin-bottom: 5px;
        }

        .coracao-grande {
            font-size: 80px;
            margin: 10px 0;
            animation: bater 0.8s infinite alternate;
            display: inline-block;
        }

        .frase-impacto {
            font-size: clamp(28px, 6vw, 45px);
            color: #ffcc00;
            margin: 15px 0;
            line-height: 1.2;
            max-width: 90%;
            margin-left: auto;
            margin-right: auto;
        }

        /* Estilo do Botão do WhatsApp */
        .btn-whatsapp {
            display: inline-block;
            margin-top: 25px;
            padding: 15px 30px;
            background-color: #25d366; /* Cor oficial do WhatsApp */
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-size: 22px;
            font-family: sans-serif; /* Fonte mais limpa para o botão */
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3);
            transition: transform 0.3s, background-color 0.3s;
        }

        .btn-whatsapp:hover {
            background-color: #128c7e;
            transform: scale(1.05);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes bater {
            from { transform: scale(1); }
            to { transform: scale(1.2); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Sabia que diria sim! ❤️</h1>
        
        <div class="coracao-grande">💖</div>
        
        <div class="frase-impacto">
            "Gosto tanto de você que posso enlouquecer."
        </div>

        <a href="https://wa.me/5551993981826?text=Eu%20também%20gosto%20muito%20de%20você!%20❤️" class="btn-whatsapp" target="_blank">
            Me chama aqui! 😊
        </a>
    </div>

</body>
</html>
